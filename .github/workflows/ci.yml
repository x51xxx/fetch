name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      # Same dependency list build.yml uses to compile BoringSSL via the
      # btls crate on Linux -- clippy needs a real compile, not just a parse.
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake perl pkg-config libclang-dev

      - run: pnpm install --frozen-lockfile

      - name: Prettier + ESLint
        run: pnpm exec prettier --check . && pnpm exec eslint .

      - name: cargo fmt --check
        run: cargo fmt -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  build:
    uses: ./.github/workflows/build.yml
