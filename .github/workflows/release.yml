name: Release

# Push a tag like `v1.0.1` (matching the version in package.json) to build
# every target, assemble the platform packages, and publish everything to
# npm: the main @trishchuk/fetch package plus one @trishchuk/fetch-<platform>
# package per target in npm.targets, wired together via optionalDependencies
# (see index.js's binary-loading logic and package.json).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/build.yml

  publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # napi pre-publish --gh-release creates a GitHub Release
      id-token: write # OIDC token for npm trusted publishing (and provenance)
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      # Trusted publishing needs npm >= 11.5.1. `node-version: 24` resolves to
      # whatever 24.x is current, whose bundled npm may be older -- and an older
      # npm silently ignores OIDC and falls back to token auth (which we no
      # longer provide), so pin a new-enough npm explicitly rather than hope the
      # runner ships one.
      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      - name: Verify tag matches package.json version
        if: github.event_name == 'push'
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          pkg_version="$(node -p "require('./package.json').version")"
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::tag $GITHUB_REF_NAME (version $tag_version) does not match package.json version $pkg_version"
            exit 1
          fi

      # Each build job uploaded its `.node` as `bindings-<target>`; this
      # downloads them all into artifacts/bindings-<target>/*.node, matching
      # what `napi artifacts` (next step) expects.
      - uses: actions/download-artifact@v4
        with:
          pattern: bindings-*
          path: artifacts

      # Copies each artifacts/bindings-<target>/*.node into its
      # npm/<platform>/ package directory (verified locally: reads
      # artifacts/bindings-<target>/*.node, writes npm/<platform>/*.node).
      - run: pnpm exec napi artifacts --output-dir artifacts

      - name: Verify every target produced a binary
        run: |
          missing=0
          for dir in npm/*/; do
            if ! find "$dir" -name '*.node' -print -quit | grep -q .; then
              echo "::error::$dir has no .node binary -- a build job produced a binary for the wrong target, or did not run"
              missing=1
            fi
          done
          exit $missing

      # Updates each npm/<platform>/package.json version to match the root
      # package.json, and rewrites root package.json's optionalDependencies
      # from `workspace:*` (a pnpm-only spec npm can't resolve) to the exact
      # published version.
      #
      # --skip-optional-publish is required: without it, pre-publish ALSO runs
      # `npm publish` in each npm/<platform>/ itself -- with no `--access
      # public`, so the first publish of these scoped packages would fail
      # outright -- and the explicit "Publish platform packages" step below
      # would then try to publish the same versions a second time. We let that
      # step own all publishing. The GitHub release and .node asset uploads
      # still happen here (they're outside the skipped publish path).
      - run: pnpm exec napi pre-publish --tagstyle npm --gh-release --skip-optional-publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Auth is via OIDC trusted publishing (the id-token permission above), so
      # there is no NODE_AUTH_TOKEN. Each of these 8 packages must have a
      # matching trusted publisher configured on npmjs.com (repo x51xxx/fetch,
      # workflow release.yml) or the publish is rejected. --provenance is
      # omitted because trusted publishing generates provenance automatically.
      - name: Publish platform packages
        run: |
          for dir in npm/*/; do
            npm publish "$dir" --access public
          done

      - name: Publish main package
        run: npm publish --access public
