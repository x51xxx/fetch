name: Build

# Reusable: builds every target in the matrix below and uploads each `.node`
# binary as an artifact named `bindings-<target>`. Called by both ci.yml (on
# every push/PR) and release.yml (on version tags), so the build matrix only
# has to be maintained in one place.
on:
  workflow_call:

env:
  CARGO_TERM_COLOR: always
  DEBUG: napi:*

jobs:
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # `platform` is napi's name for the target (and the npm/<platform>/
          # package directory); the build step asserts the emitted binary is
          # actually named fetch.<platform>.node.
          - host: macos-latest
            target: aarch64-apple-darwin
            platform: darwin-arm64
            testable: true
          - host: macos-latest
            target: x86_64-apple-darwin
            platform: darwin-x64
            # Cross-compiled from the arm64 macos-latest runner via Xcode's
            # universal clang -- no separate x64 macOS runner needed.
            # Build-only: the runner's Node is arm64, and an arm64 Node cannot
            # load an x64 .node addon. Rosetta 2 does not help -- it runs x64
            # *processes*, but `pnpm test` still launches the arm64 Node. To
            # actually test this target, add a second setup-node with
            # `architecture: x64` and run the suite under `arch -x86_64`.
            testable: false
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x64-gnu
            testable: true
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            platform: linux-arm64-gnu
            # Cross-compiled via crossbuild-essential-arm64 (same approach
            # wreq's own CI uses for BoringSSL, see
            # https://github.com/0x676e67/wreq/blob/main/.github/compilation-guide/build.yml).
            # Not natively runnable on an x64 runner without QEMU, so this
            # target is build-only here -- run the test suite on real arm64
            # Linux (hardware or a native arm64 runner) before trusting it.
            testable: false
          # musl targets are cross-compiled from this glibc runner rather than
          # built natively in Alpine, which is the obvious-looking approach and
          # does not work: napi always passes --target to cargo, and cargo never
          # applies RUSTFLAGS to *host* units when --target is given. On an
          # Alpine/rustup host that leaves every build script a static musl
          # binary -- and btls-sys's build script has to dlopen libclang for
          # bindgen, which a static binary cannot do ("Dynamic loading not
          # supported"). Building from glibc keeps build scripts dynamically
          # linked while the addon itself still links musl. Verified locally on
          # both arches before landing; don't "simplify" this to Alpine.
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            platform: linux-x64-musl
            # Cross-compiled against musl, so the runner's glibc Node cannot
            # load it -- build-only here. Verified by hand in an amd64 Alpine
            # container (loads, lists presets, completes a real HTTPS request
            # through BoringSSL); re-check there rather than trusting CI alone.
            testable: false
          - host: ubuntu-latest
            target: aarch64-unknown-linux-musl
            platform: linux-arm64-musl
            testable: false

          - host: windows-latest
            target: x86_64-pc-windows-msvc
            platform: win32-x64-msvc
            testable: true
    runs-on: ${{ matrix.host }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          workspaces: . -> target

      # Same dependency list wreq's own CI uses to compile BoringSSL via the
      # btls crate on Linux: https://github.com/0x676e67/wreq#building
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          # xz-utils backs `tar -xJf` for the musl toolchain below; it is
          # present on current runner images, but the build must not silently
          # depend on that staying true.
          sudo apt-get install -y build-essential cmake perl pkg-config libclang-dev xz-utils

      - name: Install aarch64 cross-compiler
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get install -y crossbuild-essential-arm64
          {
            echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc"
            echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++"
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-g++"
            echo "CFLAGS_aarch64_unknown_linux_gnu=-D__ARM_ARCH=8"
          } >> "$GITHUB_ENV"

      # musl-cross-make toolchain, which ships gcc *and* g++ for musl. Debian's
      # musl-tools is not a substitute: it has musl-gcc but no g++, and
      # BoringSSL is C++.
      #
      # Source is cross-tools/musl-cross on GitHub Releases, NOT musl.cc.
      # musl.cc is a single self-hosted box on a consumer ISP (216.82.192.11,
      # Grande Communications) that blackholes GitHub's runner ranges: every
      # musl job ever run here died with `curl: (28) Failed to connect ...
      # after ~133s` (a full SYN-retry ladder, i.e. no response at all) while
      # the same host answered instantly from a normal connection. Retries
      # only multiplied the timeout. GitHub Releases sit on the same CDN the
      # runner already talks to, so that failure mode cannot recur.
      #
      # These tarballs name binaries with the FULL target triple
      # (aarch64-unknown-linux-musl-gcc), where musl.cc used a short prefix
      # (aarch64-linux-musl-gcc) -- which happens to be the name napi
      # hardcodes for the arm64 musl target (TARGET_LINKER in @napi-rs/cli).
      # That is safe: napi only injects its own linker when the cargo linker
      # env var is unset (`if (linker && !process.env[linkerEnv])`, see
      # @napi-rs/cli dist/cli.js), and the explicit exports below always set
      # it. napi has no entry for x86_64-unknown-linux-musl at all, so that
      # one would otherwise silently link with the runner's glibc gcc --
      # another reason to set both explicitly rather than trust napi's table.
      - name: Install musl cross toolchain
        if: contains(matrix.target, 'musl')
        env:
          # Pin the toolchain build for reproducibility; bump deliberately.
          MUSL_CROSS_RELEASE: '20260515'
        run: |
          base="https://github.com/cross-tools/musl-cross/releases/download/${MUSL_CROSS_RELEASE}"
          # Download to a file rather than piping into tar: the default shell
          # here is `bash -e` without pipefail, so `curl | tar` would swallow a
          # failed download and hand tar an empty stream. -f turns HTTP errors
          # into a non-zero exit.
          curl -fsSL --retry 3 --retry-delay 5 \
            -o /tmp/musl-toolchain.tar.xz \
            "${base}/${{ matrix.target }}.tar.xz"
          # The .sha256 asset holds the bare hash, so pair it with the path
          # ourselves. This is a third-party binary toolchain that ends up
          # linked into a published artifact -- verify it.
          curl -fsSL --retry 3 --retry-delay 5 \
            -o /tmp/musl-toolchain.sha256 \
            "${base}/${{ matrix.target }}.tar.xz.sha256"
          echo "$(cat /tmp/musl-toolchain.sha256)  /tmp/musl-toolchain.tar.xz" \
            | sha256sum -c -
          sudo tar -xJf /tmp/musl-toolchain.tar.xz -C /opt
          test -x "/opt/${{ matrix.target }}/bin/${{ matrix.target }}-g++"
          echo "/opt/${{ matrix.target }}/bin" >> "$GITHUB_PATH"
          under="$(echo '${{ matrix.target }}' | tr '-' '_')"
          upper="$(echo "$under" | tr '[:lower:]' '[:upper:]')"
          # The libc headers live in <triple>/sysroot/usr/include, NOT in
          # <triple>/include -- that one holds only the C++ headers. Getting
          # this wrong is not a loud failure on every arch (see the bindgen
          # note below), so assert the C headers are really there.
          sysroot="/opt/${{ matrix.target }}/${{ matrix.target }}/sysroot"
          test -f "${sysroot}/usr/include/stdio.h"
          {
            echo "CC_${under}=${{ matrix.target }}-gcc"
            echo "CXX_${under}=${{ matrix.target }}-g++"
            echo "AR_${under}=${{ matrix.target }}-ar"
            echo "CARGO_TARGET_${upper}_LINKER=${{ matrix.target }}-gcc"
            # bindgen shells out to clang for BoringSSL's headers and does NOT
            # inherit the cc crate's compiler or sysroot -- left alone it reads
            # the runner's *glibc* headers from /usr/include. arm64 fails loudly
            # ("bits/libc-header-start.h file not found"); x64 silently generates
            # bindings from glibc headers for a musl target, which is worse.
            echo "BINDGEN_EXTRA_CLANG_ARGS_${under}=--target=${{ matrix.target }} --sysroot=${sysroot}"
          } >> "$GITHUB_ENV"

      - name: Set arm64 BoringSSL flag for musl
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: echo "CFLAGS_aarch64_unknown_linux_musl=-D__ARM_ARCH=8" >> "$GITHUB_ENV"

      - name: Install macOS build dependencies
        if: runner.os == 'macOS'
        run: brew install cmake pkg-config llvm

      # BoringSSL's Windows build needs Perl (codegen) and NASM (assembly
      # crypto routines) in addition to cmake/llvm -- see the Windows job in
      # wreq's own compilation guide (link above).
      - name: Install Windows build dependencies
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          choco install cmake -y
          choco install strawberryperl -y
          choco install pkgconfiglite -y
          choco install llvm -y
          choco install nasm -y

      - name: Set static CRT for Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: echo "RUSTFLAGS=-C target-feature=+crt-static" >> $env:GITHUB_ENV

      - run: pnpm install --frozen-lockfile

      # No `--` before `--target`: pnpm forwards `--` literally to the script,
      # and napi treats everything after it as cargo passthrough. That left
      # napi's own --target undefined, so it silently built for the *host* and
      # named the output after the host platform -- the x64 macOS job emitted
      # fetch.darwin-arm64.node, and the arm64 Linux job emitted
      # fetch.linux-x64-gnu.node. Args passed without `--` reach napi itself.
      - name: Build ${{ matrix.target }}
        run: pnpm run build --target ${{ matrix.target }}

      # napi derives the output filename from the target it actually compiled
      # for, so asserting the name catches a build that silently fell back to
      # the host. That fallback is what broke the v1.0.0 release: two platform
      # packages ended up with no binary, and only release.yml's pre-publish
      # check caught it -- after the whole matrix had already gone green.
      - name: Verify the binary matches the target
        shell: bash
        run: |
          expected="fetch.${{ matrix.platform }}.node"
          if [ ! -f "$expected" ]; then
            echo "::error::expected $expected, got: $(ls -1 ./*.node 2>/dev/null | tr '\n' ' ')"
            echo "::error::napi built for the wrong target -- check that --target reached napi, not cargo"
            exit 1
          fi
          echo "ok: $expected"

      - name: Test
        if: matrix.testable
        run: pnpm test

      - uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: '*.node'
          if-no-files-found: error
