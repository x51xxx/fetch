name: Build

# Reusable: builds every target in the matrix below and uploads each `.node`
# binary as an artifact named `bindings-<target>`. Called by both ci.yml (on
# every push/PR) and release.yml (on version tags), so the build matrix only
# has to be maintained in one place.
on:
  workflow_call:

env:
  CARGO_TERM_COLOR: always
  DEBUG: napi:*

jobs:
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # `platform` is napi's name for the target (and the npm/<platform>/
          # package directory); the build step asserts the emitted binary is
          # actually named fetch.<platform>.node.
          - host: macos-latest
            target: aarch64-apple-darwin
            platform: darwin-arm64
            testable: true
          - host: macos-latest
            target: x86_64-apple-darwin
            platform: darwin-x64
            # Cross-compiled from the arm64 macos-latest runner via Xcode's
            # universal clang -- no separate x64 macOS runner needed.
            # Build-only: the runner's Node is arm64, and an arm64 Node cannot
            # load an x64 .node addon. Rosetta 2 does not help -- it runs x64
            # *processes*, but `pnpm test` still launches the arm64 Node. To
            # actually test this target, add a second setup-node with
            # `architecture: x64` and run the suite under `arch -x86_64`.
            testable: false
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x64-gnu
            testable: true
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            platform: linux-arm64-gnu
            # Cross-compiled via crossbuild-essential-arm64 (same approach
            # wreq's own CI uses for BoringSSL, see
            # https://github.com/0x676e67/wreq/blob/main/.github/compilation-guide/build.yml).
            # Not natively runnable on an x64 runner without QEMU, so this
            # target is build-only here -- run the test suite on real arm64
            # Linux (hardware or a native arm64 runner) before trusting it.
            testable: false
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            platform: win32-x64-msvc
            testable: true
    runs-on: ${{ matrix.host }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          workspaces: . -> target

      # Same dependency list wreq's own CI uses to compile BoringSSL via the
      # btls crate on Linux: https://github.com/0x676e67/wreq#building
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake perl pkg-config libclang-dev

      - name: Install aarch64 cross-compiler
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get install -y crossbuild-essential-arm64
          {
            echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc"
            echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++"
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-g++"
            echo "CFLAGS_aarch64_unknown_linux_gnu=-D__ARM_ARCH=8"
          } >> "$GITHUB_ENV"

      - name: Install macOS build dependencies
        if: runner.os == 'macOS'
        run: brew install cmake pkg-config llvm

      # BoringSSL's Windows build needs Perl (codegen) and NASM (assembly
      # crypto routines) in addition to cmake/llvm -- see the Windows job in
      # wreq's own compilation guide (link above).
      - name: Install Windows build dependencies
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          choco install cmake -y
          choco install strawberryperl -y
          choco install pkgconfiglite -y
          choco install llvm -y
          choco install nasm -y

      - name: Set static CRT for Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: echo "RUSTFLAGS=-C target-feature=+crt-static" >> $env:GITHUB_ENV

      - run: pnpm install --frozen-lockfile

      # No `--` before `--target`: pnpm forwards `--` literally to the script,
      # and napi treats everything after it as cargo passthrough. That left
      # napi's own --target undefined, so it silently built for the *host* and
      # named the output after the host platform -- the x64 macOS job emitted
      # fetch.darwin-arm64.node, and the arm64 Linux job emitted
      # fetch.linux-x64-gnu.node. Args passed without `--` reach napi itself.
      - name: Build ${{ matrix.target }}
        run: pnpm run build --target ${{ matrix.target }}

      # napi derives the output filename from the target it actually compiled
      # for, so asserting the name catches a build that silently fell back to
      # the host. That fallback is what broke the v1.0.0 release: two platform
      # packages ended up with no binary, and only release.yml's pre-publish
      # check caught it -- after the whole matrix had already gone green.
      - name: Verify the binary matches the target
        shell: bash
        run: |
          expected="fetch.${{ matrix.platform }}.node"
          if [ ! -f "$expected" ]; then
            echo "::error::expected $expected, got: $(ls -1 ./*.node 2>/dev/null | tr '\n' ' ')"
            echo "::error::napi built for the wrong target -- check that --target reached napi, not cargo"
            exit 1
          fi
          echo "ok: $expected"

      - name: Test
        if: matrix.testable
        run: pnpm test

      - uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: '*.node'
          if-no-files-found: error
